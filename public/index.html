<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cool Eva</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#0f172a; --tile:#1e293b; --muted:#64748b; --dim:#334155; --fg:#e2e8f0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    min-height: 100vh; padding: env(safe-area-inset-top) 0.6rem 1rem;
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 0.3rem 0.8rem;
  }
  header .title { font-size: 1rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .status { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #ef4444; transition: background .3s; }
  .dot.connected { background: #22c55e; }

  .banner {
    display: none; text-align: center; padding: 0.7rem; margin: 0 0.3rem 0.8rem;
    border-radius: 0.8rem; background: linear-gradient(90deg,#0c4a6e,#155e75);
    font-size: 1.1rem; font-weight: 500; letter-spacing: .04em;
  }
  .banner.show { display: block; }
  .banner b { font-weight: 700; }

  .grid {
    display: grid; gap: 0.6rem;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  }
  .tile {
    background: var(--tile); border-radius: 0.9rem; padding: 0.9rem 0.8rem;
    display: flex; flex-direction: column; gap: 0.25rem; min-height: 104px;
    transition: opacity .3s;
  }
  .tile.span2 { grid-column: span 2; }
  .tile.stale { opacity: 0.4; }
  .tile .label {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted);
  }
  .tile .value {
    font-size: 2.6rem; font-weight: 250; line-height: 1; font-variant-numeric: tabular-nums;
    margin-top: auto;
  }
  .tile.big .value { font-size: 3.6rem; }
  .tile .unit { font-size: 1rem; color: var(--muted); margin-left: 0.15rem; }
  .tile .sub { font-size: 0.72rem; color: var(--dim); }
</style>
</head>
<body>
  <header>
    <span class="title">Cool&nbsp;Eva</span>
    <span class="status"><span class="dot" id="dot"></span><span id="status">connecting</span></span>
  </header>

  <div class="banner" id="banner"></div>
  <div class="grid" id="grid"></div>

<script>
// Tile config. `charge` tiles only show while charging. `color(v)` -> CSS color.
const tempColor = c => c == null ? null : c < 5 ? '#38bdf8' : c < 20 ? '#67e8f9' : c < 35 ? '#4ade80' : c < 45 ? '#facc15' : c < 55 ? '#fb923c' : '#f87171';
const spreadColor = mv => mv < 15 ? '#4ade80' : mv < 30 ? '#facc15' : mv < 50 ? '#fb923c' : '#f87171';
const auxColor = v => v < 11.8 ? '#f87171' : v < 12.4 ? '#facc15' : '#4ade80';
const socColor = v => v < 15 ? '#f87171' : v < 30 ? '#facc15' : '#4ade80';
const powerColor = kw => { const a = Math.abs(kw); return a < 3 ? '#e2e8f0' : a < 15 ? '#facc15' : a < 40 ? '#fb923c' : '#f87171'; };

// The array order below IS the on-screen order — reorder these lines to taste.
// A tile is either a single `key`, or a paired `keys:[a,b]` shown as "a / b".
// `charge` tiles only show while charging; `sub(sigs)` adds a small 2nd line.
// Speed / SOC / power / current / pack-V / RPM / SOH are intentionally NOT shown
// here (they're on the bike's own dash) — but they're still logged to sqlite + Grafana.
const TILES = [
  // Temperatures — paired tiles, grouped for glanceability
  { keys:['batt_temp_lo','batt_temp_hi'], label:'Battery', unit:'°C', span2:true, fmt:v=>v.toFixed(0), color:tempColor, sub:()=>'min / max' },
  { keys:['coolant_in','coolant_out'], label:'Coolant', unit:'°C', span2:true, fmt:v=>v.toFixed(1), color:tempColor, sub:()=>'in / out' },
  { key:'bike_coolant_temp', label:'Motor', unit:'°C', fmt:v=>v.toFixed(0), color:tempColor },
  { key:'oil_temp', label:'Oil', unit:'°C', fmt:v=>v.toFixed(0), color:tempColor },
  { key:'ambient_temp', label:'Ambient', unit:'°C', fmt:v=>v.toFixed(0), color:tempColor },
  // Cell balance — spread + which cells are weakest/strongest
  { key:'cell_spread_mv', label:'Cell spread', unit:'mV', fmt:v=>v.toFixed(0), color:spreadColor,
    sub:s => (s.min_cell_idx && s.max_cell_idx) ? `low #${s.min_cell_idx.value} · high #${s.max_cell_idx.value}` : '' },
  { key:'aux_12v', label:'12V aux', unit:'V', fmt:v=>v.toFixed(2), color:auxColor },
  // High-beam switch (raw 0x410 b4) — flips when you toggle the beam; for verifying / fun
  { key:'high_beam', label:'High beam', unit:'', fmt:v=>v.toFixed(0), color:v=> v ? '#fde047' : '#475569' },
  // Charging (only while charging)
  { key:'dc_v', label:'Charge', unit:'V', fmt:v=>v.toFixed(0), charge:true },
  { key:'dc_a', label:'Charge', unit:'A', fmt:v=>v.toFixed(1), charge:true },
  { key:'mains_v', label:'Mains', unit:'V', fmt:v=>v.toFixed(0), charge:true },
  { key:'mains_a', label:'Mains', unit:'A', fmt:v=>v.toFixed(1), charge:true },
];

const STALE_MS = 8000;
const grid = document.getElementById('grid');
const dot = document.getElementById('dot');
const statusEl = document.getElementById('status');
const banner = document.getElementById('banner');
const els = {};

function cfgId(cfg) { return cfg.key || cfg.keys.join('+'); }

function tile(cfg) {
  const id = cfgId(cfg);
  if (els[id]) return els[id];
  const div = document.createElement('div');
  div.className = 'tile' + (cfg.big ? ' big' : '') + (cfg.span2 ? ' span2' : '');
  div.innerHTML = `<div class="label">${cfg.label}</div><div class="value">--</div>` + (cfg.sub ? '<div class="sub"></div>' : '');
  grid.appendChild(div);
  els[id] = { div, valueEl: div.querySelector('.value'), subEl: div.querySelector('.sub') };
  return els[id];
}

function chargeLabel(state) {
  if (state === 2) return 'AC charging';
  if (state === 10) return 'DC charging';
  if (state === 16) return 'Charge ending…';
  return null;
}

function render(snap) {
  const serverNow = snap.ts || Date.now();
  const sig = snap.signals || {};
  const state = sig.charge_state ? sig.charge_state.value : 1;
  const charging = state !== undefined && state !== 1;

  const cl = chargeLabel(state);
  if (cl && charging) {
    const kw = sig.dc_v && sig.dc_a ? (sig.dc_v.value * sig.dc_a.value / 1000) : null;
    banner.innerHTML = `<b>${cl}</b>${kw != null ? ' · ' + kw.toFixed(1) + ' kW' : ''}`;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }

  for (const cfg of TILES) {
    const id = cfgId(cfg);
    let show, valueHtml, colorVal, ts;
    if (cfg.keys) {
      const a = sig[cfg.keys[0]], b = sig[cfg.keys[1]];
      show = a && b && (!cfg.charge || charging);
      if (show) {
        valueHtml = `${cfg.fmt(a.value)} / ${cfg.fmt(b.value)}<span class="unit">${cfg.unit}</span>`;
        colorVal = b.value;
        ts = Math.min(a.ts, b.ts);
      }
    } else {
      const s = sig[cfg.key];
      show = s && (!cfg.charge || charging);
      if (show) {
        valueHtml = `${cfg.fmt(s.value)}<span class="unit">${cfg.unit}</span>`;
        colorVal = s.value;
        ts = s.ts;
      }
    }
    if (!show) { if (els[id]) els[id].div.style.display = 'none'; continue; }
    const t = tile(cfg);
    t.div.style.display = '';
    t.div.classList.toggle('stale', (serverNow - ts) > STALE_MS);
    t.valueEl.innerHTML = valueHtml;
    t.valueEl.style.color = cfg.color ? (cfg.color(colorVal) || '') : '';
    if (t.subEl) t.subEl.textContent = cfg.sub ? (cfg.sub(sig) || '') : '';
  }
}

let lastMessageAt = 0;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => { dot.classList.add('connected'); statusEl.textContent = 'live'; };
  ws.onmessage = e => {
    lastMessageAt = Date.now();
    try { render(JSON.parse(e.data)); } catch (err) { console.error(err); }
  };
  ws.onerror = () => ws.close();
  ws.onclose = () => {
    dot.classList.remove('connected'); statusEl.textContent = 'reconnecting';
    setTimeout(connect, 2000);
  };
}

// Watchdog: force-reconnect if the stream goes quiet.
setInterval(() => {
  if (lastMessageAt && Date.now() - lastMessageAt > 10000) {
    dot.classList.remove('connected'); statusEl.textContent = 'reconnecting';
  }
}, 3000);

connect();
</script>
</body>
</html>
